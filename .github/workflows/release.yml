name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  build:
    name: build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: aarch64-apple-darwin
            os: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Build release binary
        run: cargo build --release --locked --target ${{ matrix.target }}

      - name: Package tarball
        shell: bash
        run: |
          cd target/${{ matrix.target }}/release
          tar -czf "${GITHUB_WORKSPACE}/memcrate-${{ matrix.target }}.tar.gz" memcrate
          cd "${GITHUB_WORKSPACE}"
          shasum -a 256 "memcrate-${{ matrix.target }}.tar.gz" > "memcrate-${{ matrix.target }}.tar.gz.sha256"

      - name: Upload artifacts to release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            memcrate-${{ matrix.target }}.tar.gz
            memcrate-${{ matrix.target }}.tar.gz.sha256
          generate_release_notes: true
          fail_on_unmatched_files: true
