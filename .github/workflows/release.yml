name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  build:
    name: build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            archive: tar.gz
          - target: aarch64-apple-darwin
            os: macos-latest
            archive: tar.gz
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            archive: zip

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Build release binary
        run: cargo build --release --locked --target ${{ matrix.target }}

      - name: Package tarball (Unix)
        if: matrix.archive == 'tar.gz'
        shell: bash
        run: |
          cd target/${{ matrix.target }}/release
          tar -czf "${GITHUB_WORKSPACE}/memcrate-${{ matrix.target }}.tar.gz" memcrate
          cd "${GITHUB_WORKSPACE}"
          shasum -a 256 "memcrate-${{ matrix.target }}.tar.gz" > "memcrate-${{ matrix.target }}.tar.gz.sha256"

      - name: Package zip (Windows)
        if: matrix.archive == 'zip'
        shell: pwsh
        run: |
          $archive = "memcrate-${{ matrix.target }}.zip"
          Compress-Archive -Path "target/${{ matrix.target }}/release/memcrate.exe" -DestinationPath $archive
          $hash = (Get-FileHash $archive -Algorithm SHA256).Hash.ToLower()
          "$hash  $archive" | Out-File -Encoding ascii -NoNewline "$archive.sha256"

      - name: Upload artifacts to release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            memcrate-${{ matrix.target }}.${{ matrix.archive }}
            memcrate-${{ matrix.target }}.${{ matrix.archive }}.sha256
          generate_release_notes: true
          fail_on_unmatched_files: true

  publish-crate:
    name: publish to crates.io
    needs: build
    runs-on: ubuntu-latest
    # Skip pre-releases (tags containing a hyphen, e.g. v0.4.0-rc.1)
    if: ${{ !contains(github.ref_name, '-') }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: cargo publish
        run: cargo publish --locked
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
